<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
    <link href="/fontawesome-free-5.15.1-web/css/fontawesome.min.css" rel="stylesheet">
    <link href="/fontawesome-free-5.15.1-web/css/solid.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
  </head>

  <body>
    <header>
      <img src="mercado-livre-logo.png">
      <section class="search-bar">
        <input type="search" placeholder="Buscar produtos, marcas e muito mais...">
        <button type="submit"><i class="fas fa-search"></i></button>
      </section>
      <section class="finance-car">
        <i class="fas fa-car-side"></i>
        <p>Financie seu próximo carro aqui</p>
      </section>
    </header>

    <nav>
      <section>
        <i class="fas fa-map-marker-alt"></i>
        <p>Informe seu CEP</p>
      </section>
      <ul class="navigator">
        <li>Categorias</li>
        <li>Ofertas do dia</li>
        <li>Histórico</li>
        <li>Contato</li>
      </ul>
      <ul class="navigator">
        <li>Crie sua conta</li>
        <li>Entre</li>
        <li>Compras</li>
        <li><i class="fas fa-shopping-cart"></i></li>
      </ul>
    </nav>

    <section>
      <p>Buscas relacionadas: Informática - computador - PC de Mesa</p>
    </section>

    <section class="container">
      <section class="items"></section>
      <section class="cart">
        <span class="cart__title">Carrinho de compras</span>
        <section class="total-price">
          <div class="display">0.00</div>
        </section>
        <button class="empty-cart">Esvaziar carrinho</button>
        <section class="loading-container"></section>
        <ol class="cart__items"></ol>
      </section>
    </section>
  </body>
</html>
